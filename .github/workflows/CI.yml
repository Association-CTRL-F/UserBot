name: CI

on:
  pull_request:
    paths:
      - '**/*.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          check-latest: true
          cache: 'npm'

      - run: npm ci
      - run: npm test